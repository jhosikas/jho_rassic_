<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DRACARYS: 6x6 Sudoku Bypass</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-red: #ff003c; 
            --neon-blue: #00d4ff;
            --neon-green: #00ff41;
            --bg-black: #050505; 
        }
        
        body {
            background: var(--bg-black); 
            color: white; 
            font-family: 'Orbitron', sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            margin: 0;
        }

        .terminal {
            border: 3px solid var(--neon-red); 
            padding: 30px;
            background: rgba(0, 0, 0, 0.9); 
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.3);
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(6, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 4px;
            background: #333;
            padding: 4px;
        }

        .cell {
            width: 60px; 
            height: 60px; 
            background: #111;
            color: white;
            border: 1px solid #222; 
            text-align: center;
            font-family: 'Orbitron'; 
            font-size: 24px; 
            outline: none;
            transition: 0.2s;
        }

        .cell:disabled { 
            color: var(--neon-blue);
            background: #0a0a0a;
            opacity: 1;
            -webkit-text-fill-color: var(--neon-blue);
        }

        /* 2x3 Grid Borders */
        .cell:nth-child(3n) { border-right: 4px solid var(--neon-red); }
        .cell:nth-child(n+13):nth-child(-n+18), 
        .cell:nth-child(n+31):nth-child(-n+36) { border-bottom: 4px solid var(--neon-red); }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: var(--neon-red); 
            border: none; 
            color: white;
            font-family: 'Orbitron'; 
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
        }
        
        button:hover { background: white; color: black; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2>SUDOKU CORE BYPASS</h2>
        <div id="status" style="font-size: 14px; margin-bottom: 10px; color: var(--neon-red); text-align: center;">SYSTEM ACCESS: PENDING</div>
        
        <div class="sudoku-grid" id="grid"></div>

        <div id="lives" style="color: #fff; font-size: 12px; margin-top: 15px; text-align: center;">
            CHANCES: <span id="life-count" style="color: var(--neon-green);">3</span> | 
            HINTS: <span id="hint-count" style="color: var(--neon-blue);">2</span>
        </div>

        <div class="controls">
            <button id="hint-btn" onclick="useHint()">Request Hint</button>
            <button onclick="location.reload()">Reset Terminal</button>
        </div>
    </div>

<script>
    const puzzle = [
        6, 2, 0, 5, 0, 3,
        0, 0, 0, 0, 0, 0,
        5, 0, 0, 0, 3, 0,
        0, 6, 0, 0, 2, 0,
        0, 0, 0, 3, 4, 6,
        3, 0, 6, 0, 0, 0
    ];
    
    const solution = [
        6, 2, 4, 5, 1, 3,
        1, 3, 5, 4, 6, 2,
        5, 1, 2, 6, 3, 4,
        4, 6, 3, 1, 2, 5,
        2, 5, 1, 3, 4, 6,
        3, 4, 6, 2, 5, 1
    ];

    let lives = 3;
    let hintsRemaining = 2;
    let filledCount = 0;
    const totalToFill = puzzle.filter(x => x === 0).length;

    function createGrid() {
        const gridEl = document.getElementById('grid');
        puzzle.forEach((val, i) => {
            const input = document.createElement('input');
            input.type = 'text';
            input.inputMode = 'numeric';
            input.maxLength = 1;
            input.className = 'cell';
            input.id = `cell-${i}`;
            
            if (val !== 0) {
                input.value = val;
                input.disabled = true;
            } else {
                input.oninput = (e) => checkCell(e.target, i);
            }
            gridEl.appendChild(input);
        });
    }

    function checkCell(element, index) {
        const val = parseInt(element.value);
        if (isNaN(val)) return;

        if (val === solution[index]) {
            element.style.color = "var(--neon-green)";
            element.style.backgroundColor = "rgba(0, 255, 65, 0.1)"; 
            element.disabled = true;
            filledCount++;
            checkWin();
        } else {
            lives--;
            document.getElementById('life-count').innerText = lives;
            element.value = "";
            element.style.backgroundColor = "rgba(255, 0, 60, 0.3)";
            setTimeout(() => element.style.backgroundColor = "#111", 300);

            if (lives <= 0) {
                document.getElementById('status').innerText = "SYSTEM LOCKDOWN";
                alert("GAME OVER: TERMINAL REBOOTING...");
                location.reload();
            }
        }
    }

    function useHint() {
        if (hintsRemaining <= 0) return;

        let emptyIndices = [];
        puzzle.forEach((val, i) => {
            const cell = document.getElementById(`cell-${i}`);
            if (!cell.disabled) emptyIndices.push(i);
        });

        if (emptyIndices.length > 0) {
            const randomIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
            const targetCell = document.getElementById(`cell-${randomIndex}`);

            targetCell.value = solution[randomIndex];
            targetCell.style.color = "var(--neon-blue)";
            targetCell.disabled = true;

            hintsRemaining--;
            filledCount++;
            document.getElementById('hint-count').innerText = hintsRemaining;
            
            if (hintsRemaining === 0) document.getElementById('hint-btn').disabled = true;
            checkWin();
        }
    }

    function checkWin() {
    if (filledCount === totalToFill) {
        document.getElementById('status').innerText = "CORE SECURED!";
        document.getElementById('status').style.color = "var(--neon-green)";
        
        // Notify game.html to mark as SECURED
      setTimeout(() => {
    window.parent.postMessage({ 
        action: "missionComplete", 
        mission: "DRACARYS" 
    }, "*");
}, 1000);
    }
}

    window.onload = createGrid;
</script>
</body>
</html>
