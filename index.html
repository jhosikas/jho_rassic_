<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JHOrassic</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Orbitron",sans-serif;
}

body{
height:100vh;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
position:absolute;
width:100%;
}

.logo{
color:white;
font-size:20px;
letter-spacing:4px;
font-weight:bold;
padding:4px 15px;
transition:0.3s;
}

.logo:hover{
transform:scale(1.3);
color:red;
text-shadow:0 0 5px red,
            0 0 10px red,
            0 0 20px red;
}


nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:30px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:16px;
padding:8px 15px;
border-radius:5px;
transition:0.3s;
}
nav ul li a:hover{
color:#ff0000;
background:rgba(255,0,0,0.15);
box-shadow:0 0 5px #ff0000,
           0 0 10px #ff0000,
           0 0 20px #ff0000,
           0 0 40px #ff0000;
transform:scale(1.2);


}
.hero{
height:100vh;
background-image: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url("image1.png");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

}
.hero h1{
color:#fff;
font-size:50px;
white-space:nowrap;
overflow:hidden;
border-right:3px solid red;
width:0;
animation:
typingRed 4s steps(40,end) forwards,
cursorBlink 0.8s infinite;
text-shadow:
0 0 5px #ff0000,
0 0 15px #ff3333,
0 0 30px #ff0000;
}

/* Typing emergence effect */
@keyframes typingRed{
from{ width:0 }
to{ width:63% }
}

/* Cursor blink effect */
@keyframes cursorBlink{
50%{ border-color:transparent }
}
</style>

</head>

<body>

<header>
<nav>
<div class="logo">JHOrassic</div>

<ul>
    <li><a href="index.html">LOBBY</a></li>
    <li><a href="database.html">DATABASE</a></li>
    <li><a href="game.html">MISSIONS</a></li>
    <li><a href="enlist.html">ENLIST</a></li>
    <li><a href="comms.html">COMMS</a></li>
</ul>

</nav>
</header>

<section class="hero">
<h1>Where Fun Never Goes <span>Extinct 🦖</span></h1>
</section>
<script>
document.querySelector('a[href="game.html"]').addEventListener('click', function(e) {
    e.preventDefault(); // Stop the instant jump
    const target = this.href;
    
    // Create a quick fade-out effect
    document.body.style.transition = "opacity 0.5s ease";
    document.body.style.opacity = "0";
    
    setTimeout(() => {
        window.location.href = target;
    }, 500);
});
</script>
</body>
</html>
